<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  background:var(--night); color:var(--ink);

  user-select:none;-webkit-user-select:none;
}
#app{width:100%;max-width:820px;height:100%;max-height:900px;position:relative;display:flex;flex-direction:column}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
.screen.on{display:flex}

/* ---- 星空背景 ---- */
.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.stars i{position:absolute;width:2px;height:2px;background:var(--moon);border-radius:50%;opacity:.7;animation:tw 3s infinite alternate}
@keyframes tw{from{opacity:.15}to{opacity:.85}}

/* ---- タイトル ---- */
#title h1{font-size:clamp(28px,7vw,46px);color:var(--gold);letter-spacing:.08em;text-shadow:0 0 24px rgba(255,190,107,.35);margin-top:14px}
#title .sub{color:var(--dim);margin-top:8px;font-size:14px;letter-spacing:.14em;line-height:1.9}
.portrait{width:min(56vw,220px);filter:drop-shadow(0 10px 30px rgba(0,0,0,.5))}
.btn{
  font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace,"Osaka-Mono","MS Gothic","Courier New",monospace;font-size:18px;cursor:pointer;
  background:linear-gradient(180deg,#ffce85,#f2a94f);color:#3a2410;
  border:none;border-radius:14px;padding:13px 30px;letter-spacing:.1em;
  box-shadow:0 4px 0 #a86c26, 0 10px 24px rgba(0,0,0,.4);
  transition:transform .08s;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #a86c26}
.btn.ghost{background:var(--navy2);color:var(--ink);box-shadow:0 4px 0 #0b1226;font-size:15px}
#title .hint{margin-top:16px;color:var(--dim);font-size:12px;line-height:1.9}
.lvRow{margin-top:18px;display:flex;gap:8px;justify-content:center}
.lvBtn{
  font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace,"Osaka-Mono","MS Gothic","Courier New",monospace;font-size:14px;cursor:pointer;
  background:rgba(24,38,71,.9);color:var(--moon);border:1.5px solid #34406b;
  border-radius:14px;padding:10px 12px;line-height:1.5;min-width:96px;
  display:flex;flex-direction:column;gap:4px;transition:border-color .15s,background .15s;
}
.lvBtn span{font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:10.5px;color:var(--dim);font-weight:500;line-height:1.5}
.lvBtn.on{border-color:var(--gold);background:#2a3c72;color:var(--gold)}
.lvBtn.on span{color:var(--ink)}
#recBox{margin-top:10px;font-size:11.5px;color:var(--dim);line-height:1.9;font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;min-height:0}
#muteBtn{
  position:absolute;top:10px;right:10px;z-index:20;cursor:pointer;
  font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;font-size:17px;color:var(--moon);
  background:rgba(24,38,71,.85);border:1px solid #46578c;border-radius:12px;padding:6px 11px;
}
#muteBtn.off{color:var(--dim);text-decoration:line-through}
#pauseOv{
  position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,12,28,.76);z-index:6;
}
#pauseOv.on{display:flex}
#ctrlHelp{padding:7px 10px 0;text-align:center;color:var(--dim);font-size:10.5px;line-height:1.8;font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif}
#jumpPad{position:absolute;right:12px;bottom:14px;display:flex;align-items:flex-end;gap:12px;z-index:4}

}

#jumpBtn{width:92px;height:92px;font-size:30px;border-color:#5a6ea6;background:rgba(30,46,86,.9)}

#speaker{color:var(--gold);font-weight:700;font-size:14px;letter-spacing:.12em;margin-bottom:8px;font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace}

#choices{position:absolute;left:14px;right:14px;bottom:210px;display:none;flex-direction:column;gap:10px}

canvas{width:100%;display:block;touch-action:none}

#progressBar{height:100%;width:0%;background:linear-gradient(90deg,var(--lamp),var(--gold));border-radius:3px}
#stageTitle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .6s;background:rgba(8,12,28,.35)}

  color:#ff9bd0;font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;font-size:14px;text-shadow:0 2px 6px rgba(0,0,0,.7);
}
/* アイテムバー */
#itemBar{
  display:flex;justify-content:center;gap:10px;padding:12px 8px 4px;
}
.itemBtn{
  pointer-events:auto;cursor:pointer;min-width:88px;
  font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:12.5px;font-weight:700;
  background:rgba(14,20,44,.88);color:var(--moon);
  border:1.5px solid #46578c;border-radius:14px;padding:7px 10px 6px;
  display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.3;
  transition:border-color .15s,opacity .15s;
}
.itemBtn .cnt{font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;color:var(--gold);font-size:14px}
.itemBtn:disabled{opacity:.35;cursor:default}
.itemBtn:not(:disabled):active{border-color:var(--gold);transform:translateY(1px)}

/* ---- リザルト/エンディング ---- */
#result .big,#ending .big{font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;font-size:clamp(22px,6vw,34px);color:var(--gold);letter-spacing:.15em}
#result p,#ending p{margin-top:14px;line-height:2;font-size:15.5px;max-width:520px;color:var(--moon)}
/* エンディングは全文がスクロールで読めるように（あふれてボタンが押せない問題の解消） */
#ending{justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
#endInner{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;padding:28px 20px 40px;box-sizing:border-box}
#endText{white-space:pre-line;text-align:left;transition:opacity .5s}
#endMark{color:var(--gold);font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;
  font-size:13px;margin-top:16px;letter-spacing:.1em;animation:bob 1s infinite alternate}
.orbsGained{margin-top:10px;color:var(--gold);font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace;font-size:18px}
#ending .etitle{margin-top:10px;color:var(--dim);letter-spacing:.3em;font-size:13px;font-family:"DotGothic16","Osaka-Mono","MS Gothic","Courier New",monospace}
.fadeIn{animation:fin 1.2s ease both}
@keyframes fin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

<div id="app">

<script>
/* =====================================================
   うゆの夜想曲 — story × action v2
===================================================== */
const $=s=>document.querySelector(s);
const screens={title:$('#title'),story:$('#story'),action:$('#action'),result:$('#result'),ending:$('#ending')};
function show(name){for(const k in screens)screens[k].classList.toggle('on',k===name);}
let paused=false;

/* ---------- サウンド（Web Audio・チップチューン風） ---------- */
const SND={ctx:null,master:null,mute:false,bgm:null,step:0,timer:null,want:null};
function audioInit(){
  if(SND.ctx)return;
  const C=window.AudioContext||window.webkitAudioContext;if(!C)return;
  SND.ctx=new C();SND.master=SND.ctx.createGain();
  SND.master.gain.value=0.15;SND.master.connect(SND.ctx.destination);
  if(SND.want)setBGM(SND.want);
}
function tone(freq,dur,type='square',vol=1,slide=0){
  if(!SND.ctx||SND.mute)return;
  const t0=SND.ctx.currentTime;
  const o=SND.ctx.createOscillator(),g=SND.ctx.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),t0+dur);
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g);g.connect(SND.master);
  o.start(t0);o.stop(t0+dur+0.02);
}
const SE={
 jump(){tone(320,0.13,'square',.45,240)},
 jump2(){tone(430,0.13,'square',.45,280)},
 orb(){tone(880,0.09,'triangle',.55);setTimeout(()=>tone(1318,0.11,'triangle',.4),55)},
 item(){[659,880,1108].forEach((f,i)=>setTimeout(()=>tone(f,0.09,'square',.38),i*65))},
 hit(){tone(190,0.24,'sawtooth',.55,-130)},
 poop(){tone(130,0.42,'sawtooth',.55,-70)},
 bark(){tone(150,0.16,'square',.75,70);setTimeout(()=>tone(95,0.2,'sawtooth',.45,-40),25)},
 slide(){tone(240,0.12,'triangle',.4,-90)},
 dizzy(){[520,440,370].forEach((f,i)=>setTimeout(()=>tone(f,0.12,'triangle',.4),i*90))},
 boss(){tone(72,0.5,'sawtooth',.65,-34);setTimeout(()=>tone(60,0.5,'sawtooth',.5,-20),180)},
};
/* --- 音名→周波数（A4=440） --- */
function nf(n){
  if(!n)return 0;
  const M={C:0,'C#':1,Db:1,D:2,'D#':3,Eb:3,E:4,F:5,'F#':6,Gb:6,G:7,'G#':8,Ab:8,A:9,'A#':10,Bb:10,B:11};
  const key=n.slice(0,-1),oct=+n.slice(-1);
  return 440*Math.pow(2,(M[key]+(oct-4)*12-9)/12);
}
/* --- ノイズ系パーカッション --- */
function noiseHit(dur,vol,hp){
  if(!SND.ctx||SND.mute)return;
  const t0=SND.ctx.currentTime,len=Math.max(1,(SND.ctx.sampleRate*dur)|0);
  const buf=SND.ctx.createBuffer(1,len,SND.ctx.sampleRate),dd=buf.getChannelData(0);
  for(let i=0;i<len;i++)dd[i]=Math.random()*2-1;
  const src=SND.ctx.createBufferSource();src.buffer=buf;
  const f=SND.ctx.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
  const g=SND.ctx.createGain();g.gain.setValueAtTime(vol,t0);g.gain.exponentialRampToValueAtTime(0.0008,t0+dur);
  src.connect(f);f.connect(g);g.connect(SND.master);src.start(t0);src.stop(t0+dur+0.02);
}
function kickHit(){
  if(!SND.ctx||SND.mute)return;
  const t0=SND.ctx.currentTime,o=SND.ctx.createOscillator(),g=SND.ctx.createGain();
  o.type='sine';o.frequency.setValueAtTime(150,t0);o.frequency.exponentialRampToValueAtTime(46,t0+0.11);
  g.gain.setValueAtTime(0.55,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.14);
  o.connect(g);g.connect(SND.master);o.start(t0);o.stop(t0+0.16);
}
/* --- 楽曲データ（16分×小節） --- */
const R=0; // 休符

function buildSong(d){
  const SB=16,steps=[];
  for(let bi=0;bi<d.chords.length;bi++){
    const notes=d.chords[bi].map(nf),mbar=d.melody[bi]||[];
    for(let s=0;s<SB;s++){
      steps.push({
        lead:mbar[s]?nf(mbar[s]):0,
        arp:d.arpOn[s]?notes[d.arpPat[s%d.arpPat.length]%notes.length]:0,
        bass:d.bassOn[s]?notes[0]/2:0,
        perc:d.perc[s]||'.'});
    }
  }
  return {steps,stepMs:d.stepMs,vol:d.vol,leadType:d.leadType,arpType:d.arpType};
}
const SONGS={};
function getSong(name){return SONGS[name]||(SONGS[name]=buildSong(SONGDEF[name]));}
function setBGM(name){
  SND.want=name;
  if(!SND.ctx){SND.bgm=null;clearInterval(SND.timer);SND.timer=null;return;}
  if(SND.bgm===name&&SND.timer)return;
  SND.bgm=name;SND.step=0;
  clearInterval(SND.timer);SND.timer=null;
  if(!name||!SONGDEF[name])return;
  const song=getSong(name),sm=song.stepMs/1000;
  SND.timer=setInterval(()=>{
    if(SND.mute||paused)return;
    const st=song.steps[SND.step%song.steps.length];
    if(st.lead)tone(st.lead,sm*2.4,song.leadType,song.vol);
    if(st.arp)tone(st.arp,sm*0.9,song.arpType,song.vol*0.5);
    if(st.bass)tone(st.bass,sm*1.6,'triangle',song.vol*1.05);
    if(st.perc==='k')kickHit();
    else if(st.perc==='h')noiseHit(0.03,0.12,9000);
    else if(st.perc==='s'){noiseHit(0.09,0.22,2600);tone(210,0.05,'triangle',0.18);}
    SND.step++;
  },song.stepMs);
}

const REC_KEY='uyu-nocturne-records';
function loadRecords(){
  try{

    if(r&&typeof r==='object')G.records=r;
  }catch(e){}
}
function saveRecords(){
  try{localStorage.setItem(REC_KEY,JSON.stringify(G.records));}catch(e){}
}

const RANK_NAMES={3:'TRUE END',2:'GOOD END',1:'ANOTHER END'};
function fmtTime(s){return `${Math.floor(s/60)}分${String(Math.floor(s%60)).padStart(2,'0')}秒`;}
function renderRecords(){
  let h='';
  for(const lv of[1,2,3]){
    const r=G.records[lv];
    if(r)h+=`LV${lv} ベスト：記憶 ${r.orbs}/${r.max}・${RANK_NAMES[r.rank]}・${fmtTime(r.time)}<br>`;
  }
  $('#recBox').innerHTML=h;
}

    ['うゆ','（……匂いが、変わった。まよってる匂いじゃない。「家に向かってる」匂いだ。）'],
    ['','あの人は、もう大丈夫。始発の電車か、親切なだれかの車か。とにかく、ちゃんと家に向かっている。なら、わたしのやることはひとつ——先回りして、玄関で「おかえり」を言うこと。'],
    ['','家の前にすべりこむのと、タクシーが停まるのは、ほとんど同時だった。降りてきたあの人は、玄関先にちょこんと座るうゆと、窓辺に張りついたビスケを見て、目を丸くした。'],
    ['あの人','「え、なんで外に……まさか、探しに来てくれた？」'],
    ['','答えの代わりに、うゆは一度だけ「わん」と鳴いた。ぜんぶは、ないしょ。夜の街にはまだ、拾いきれなかった記憶のかけらが光っている。——また今度、みんなの散歩で拾いにいこう。'],
  ];
  return[
    ['','橋の上で、足が止まった。嵐に洗われた体は、綿みたいに重い。金色の光が、遠くでやさしくまたたいて——だんだん、まぶたが……。'],
    ['うゆ','（だめ……まだ……もう、ちょっとで……）'],
    ['','——かちゃり。'],
    ['','鍵の音。うゆは、ソファの上ではね起きた。窓の外に金色の光はなく、いつもの夜景があるだけ。……夢、だったんだろうか。'],
    ['','でも、肉球にはたしかに夜風の冷たさが残っている。ビスケの毛布のそばでは、骨型のビスケットが、ひとつへっている。'],
    ['','玄関に立つあの人は、なぜかすこしだけ、泣いたあとの匂いがした。うゆはなにも聞かずに、ただ全力で、しっぽを振った。——今夜は、それでいい。'],
  ];
}

/* ---------- ストーリーエンジン ---------- */
let sceneIdx=0,lineIdx=0,phase='lines',typing=null;
const lineText=$('#lineText'),speakerEl=$('#speaker'),choicesEl=$('#choices'),nextMark=$('#nextMark');

function startScene(i){
  sceneIdx=i;lineIdx=0;phase='lines';
  setBGM('story');
  const sc=scenes()[i];
  $('#storyBg').style.background=sc.bg;
  $('#chapterTag').textContent=sc.tag;
  $('#pomSvg2').classList.toggle('show',!!sc.art);
  show('story');
  renderLine();
}
function typeLine(text){
  clearInterval(typing);lineText.textContent='';let i=0;nextMark.style.visibility='hidden';
  typing=setInterval(()=>{i++;lineText.textContent=text.slice(0,i);
    if(i>=text.length){clearInterval(typing);typing=null;nextMark.style.visibility='visible';}},22);
}
function currentList(){const sc=scenes()[sceneIdx];return phase==='after'?sc.after:sc.lines;}
function renderLine(){
  const [sp,tx]=currentList()[lineIdx];
  speakerEl.textContent=sp;speakerEl.style.display=sp?'block':'none';
  typeLine(tx);
}
function advanceStory(){
  if(typing){
    clearInterval(typing);typing=null;
    lineText.textContent=currentList()[lineIdx][1];nextMark.style.visibility='visible';return;
  }
  const sc=scenes()[sceneIdx];
  lineIdx++;
  if(lineIdx<currentList().length){renderLine();return;}
  if(phase==='lines'&&sc.choice){showChoices(sc.choice);return;}
  if(phase==='lines'&&sc.after){phase='after';lineIdx=0;renderLine();return;}
  endScene();
}
function showChoices(ch){
  phase='choice';nextMark.style.visibility='hidden';
  speakerEl.textContent='';speakerEl.style.display='none';
  lineText.textContent=ch.q;
  choicesEl.innerHTML='';choicesEl.style.display='flex';
  ch.opts.forEach(([label,pt])=>{
    const b=document.createElement('button');b.textContent=label;
    b.onclick=e=>{e.stopPropagation();G.kizuna+=pt;choicesEl.style.display='none';
      const sc=scenes()[sceneIdx];
      if(sc.after){phase='after';lineIdx=0;renderLine();}else endScene();};
    choicesEl.appendChild(b);
  });
}
function endScene(){
  const sc=scenes()[sceneIdx];
  if(sc.gain){
    phase='wait';
    for(const k in sc.gain)if(k!=='msg')G.items[k]=(G.items[k]||0)+sc.gain[k];
    toast(sc.gain.msg);
    sc.gain=null;
    setTimeout(()=>{gotoNext(sc.next);},1400);
    return;
  }
  gotoNext(sc.next);
}
function gotoNext(next){
  if(next.type==='action')startStage(next.stage);
  else if(next.type==='ending')showEnding();
}
$('#textBox').addEventListener('click',()=>{if(phase!=='choice'&&phase!=='wait')advanceStory();});

/* ---- 入力 ---- */
function doJump(){
  const d=A.dog;
  d.slide=0;
  if(d.jumps===0&&d.y>=GROUND-2){d.vy=-12.6;d.jumps=1;SE.jump();}
  else if(d.jumps<=1){d.vy=-10.6;d.jumps=2;SE.jump2();}
}
function jump(){doJump();}
function dive(){ // スライディング／急降下
  if(!A||A.over||paused)return;
  const d=A.dog;
  if(d.y>=GROUND-2){d.slide=34;SE.slide();}
  else if(d.y>GROUND-56){d.y=GROUND;d.vy=0;d.jumps=0;d.slide=34;SE.slide();}
  else{d.vy=Math.max(d.vy,15);d.dv=true;}
}
let swY=0,swDone=false;
cv.addEventListener('pointerdown',e=>{

  if(paused)return;
  pointerHeld=true;swY=e.clientY;swDone=false;

});
cv.addEventListener('pointermove',e=>{

['pointerup','pointercancel','pointerleave'].forEach(ev=>cv.addEventListener(ev,()=>pointerHeld=false));
document.addEventListener('keydown',e=>{

    else if(screens.story.classList.contains('on')&&phase!=='choice'&&phase!=='wait')advanceStory();
  }
  if(e.code==='ArrowDown'||e.code==='KeyS'){

/* ---- アイテム使用 ---- */
function useItem(k){
  if(!A||A.over||paused)return;
  if(k==='snack'){
    if((G.items.snack||0)<=0||G.hearts>=3)return;
    G.items.snack--;G.hearts++;A.flash=6;SE.item();
    burst(A.dog.x,A.dog.y-40,'#ffd0da');
  }
  if(k==='feather'){
    if((G.items.feather||0)<=0)return;
    G.items.feather--;A.featherT=270;SE.item();
    burst(A.dog.x,A.dog.y-40,'#fff3c8');
  }
  if(k==='bark'){
    if(A.bossActive){
      if(A.barkCd>0)return;
      A.barkCd=80; // ボス戦中は使い放題（クールダウン制）
    }else{
      if((G.items.bark||0)<=0)return;
      G.items.bark--;
    }
    A.wave={r:14,life:34,bossHit:false};A.shake=8;SE.bark();
  }
  updHUD();updItemBar();
}
$('#btnSnack').addEventListener('pointerdown',e=>{e.stopPropagation();useItem('snack');});
$('#btnFeather').addEventListener('pointerdown',e=>{e.stopPropagation();useItem('feather');});

function burst(x,y,col){
  for(let i=0;i<12;i++){const a=Math.random()*6.28,v=1.5+Math.random()*3;
    A.parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1,life:26+Math.random()*10,col});}
}

/* ---- スポーン ---- */
function spawnObs(){
  const st=A.st,kinds=st.kinds;
  let k;
  if(G.level>=2&&Math.random()<0.28)k='poop';
  else k=kinds[Math.floor(Math.random()*kinds.length)];
  let o={k,x:W+40,y:GROUND,w:34,h:34,fly:false};
  if(k==='banner'){o.fly=true;o.y=GROUND-230;o.w=26;o.h=200;}
  if(k==='poop'){o.w=32;o.h=26;}
  if(k==='cone'){o.w=30;o.h=40;}
  if(k==='box'){o.w=44;o.h=44;}
  if(k==='cat'){o.w=42;o.h=30;}
  if(k==='duct'){o.w=52;o.h=46;}
  if(k==='fence'){o.w=26;o.h=58;}
  if(k==='debris'){o.w=46;o.h=36;}
  if(k==='wave'){o.w=64;o.h=26;}
  if(k==='crow'){o.w=40;o.h=26;o.fly=true;o.y=GROUND-76-Math.random()*46;}
  // 穴の直上には置かない（たれ幕もスライド用の地面が必要）
  if((!o.fly||k==='banner')&&A.gaps.some(g=>o.x<g.x+g.w+80&&o.x+o.w>g.x-80))return;
  A.obs.push(o);
}
function spawnGap(){
  // 直前にたれ幕などが出ていたら少し待つ
  if(A.obs.some(o=>o.x>W-170)){A.gapT=40;return;}
  const w=120+Math.random()*80; // 広めの穴：滑空／はねの出番をつくる
  A.gaps.push({x:W+60,w});
  A.spawnT=Math.max(A.spawnT,60); // 穴の直後に障害物を置かない
}
function spawnOrbs(){
  const remain=A.st.orbTotal-(A.got+A.orbs.length);
  const n=Math.max(0,Math.min(3,remain));if(n===0)return;
  const baseY=GROUND-60-Math.random()*100;
  for(let i=0;i<n;i++)A.orbs.push({x:W+60+i*54,y:baseY-Math.sin(i/Math.max(1,n-1)*Math.PI)*34,r:11,tk:Math.random()*6});
}
function spawnDrop(){
  const st=A.st;if(A.dropIdx>=st.drops.length)return;
  const type=st.drops[A.dropIdx++];
  A.drops.push({type,x:W+50,y:GROUND-64-Math.random()*70,tk:Math.random()*6});
}

/* ---- メインループ ---- */
function loop(){
  rafId=requestAnimationFrame(loop);
  const st=A.st,d=A.dog;
  A.t++;
  const prog=Math.min(1,A.t/A.dur);
  $('#progressBar').style.width=(prog*100)+'%';

  // --- 物理 ---
  d.vy+=0.62;
  // 滑空（ステージ能力）：ゆるやかに沈む——広い穴はジャンプのタイミング勝負
  const gliding=(st.glide&&(pointerHeld||spaceHeld)&&d.y<GROUND-4&&d.vy>0);
  if(gliding&&d.vy>2.9)d.vy=2.9;
  // 天使のはね：ほぼ滞空できる強化滑空＋無敵（いちばん広い穴を確実に越える保険）
  if(A.featherT>0){A.featherT--;if(d.vy>1.0)d.vy=1.0;}
  d.y+=d.vy;

  // 着地判定（穴の上では着地しない）
  if(d.y>=GROUND){
    const overGap=st.pits&&A.gaps.some(g=>d.x>g.x+16&&d.x<g.x+g.w-16);
    if(!overGap){
      d.y=GROUND;d.vy=0;d.jumps=0;
      if(d.dv){d.slide=30;d.dv=false;SE.slide();}
    }
  }
  if(d.slide>0)d.slide--;
  // 穴に落ちた
  if(d.y>H+40){
    if((G.items.feather||0)>0&&A.featherT<=0){
      // 天使のはねが、落ちるうゆをすくいあげる（保険として自動発動）
      G.items.feather--;A.featherT=210;A.flash=8;d.inv=60;
      burst(d.x,GROUND-40,'#fff3c8');
      toast('✧ 天使のはねが、落ちるうゆをすくいあげた！');
      updItemBar();
      d.y=GROUND-172;d.vy=0;d.jumps=0;
    }else{
      G.hearts--;updHUD();updItemBar();A.shake=14;
      if(G.hearts<=0){failStage();return;}
      d.y=GROUND-160;d.vy=0;d.jumps=0;d.inv=110;
    }
    A.gaps=A.gaps.filter(g=>g.x>d.x+160); // 足元の穴は消す
  }
  d.run+=0.28;if(d.inv>0)d.inv--;

  // --- すれ違い犬デバフ：ステージ1.5倍速 ---
  if(A.lagT>0){
    A.lagT--;
    if(!A.bossActive)$('#debuff').textContent=`≫≫ びゅんっ！ステージ1.5倍速（あと${Math.ceil(A.lagT/60)}秒）`;
    if(A.lagT===0&&!A.bossActive)$('#debuff').textContent='';
  }

  // --- すれ違いワンコ（レベル3） ---
  if(A.rivalTimes.length&&A.t>=A.rivalTimes[0]){A.rivalTimes.shift();
    A.rivals.push({x:W+60,y:GROUND,run:0,passed:false});}
  A.rivals.forEach(r=>{
    r.x-=A.st.speed*(1+prog*0.22)*(A.lagT>0?1.5:1)+3.6;r.run+=0.3;
    if(!r.passed&&r.x<d.x-46){r.passed=true;A.lagT=600;A.flash=6;SE.dizzy();}
  });
  A.rivals=A.rivals.filter(r=>r.x>-80);

  // --- ボス：嵐の主 ---
  if(A.bossActive&&A.boss)updateBoss();
  if(A.over)return;
  if(A.bossOut>0){A.bossOut--;if(A.bossOut===0){A.over=true;clearStage();return;}}

  // --- スポーン ---
  const nearEnd=A.t>A.dur-130;
  A.spawnT--;if(A.spawnT<=0&&!nearEnd){spawnObs();A.spawnT=st.spawnBase*(1-prog*0.18)+Math.random()*st.spawnRand;}
  if(st.pits){A.gapT--;if(A.gapT<=0&&!nearEnd){spawnGap();A.gapT=150+Math.random()*150;}}
  A.orbT--;if(A.orbT<=0&&A.orbs.length<6&&!nearEnd){spawnOrbs();A.orbT=180+Math.random()*110;}
  A.dropT--;if(A.dropT<=0&&!nearEnd){spawnDrop();A.dropT=(A.dur-260)/Math.max(1,st.drops.length);}

  // --- 移動 ---
  const sp=st.speed*(1+prog*0.22)*(A.lagT>0?1.5:1);
  A.obs.forEach(o=>o.x-=sp);A.obs=A.obs.filter(o=>o.x>-90);
  A.gaps.forEach(g=>g.x-=sp);A.gaps=A.gaps.filter(g=>g.x>-g.w-40);
  A.orbs.forEach(o=>{o.x-=sp;o.tk+=0.15;});A.orbs=A.orbs.filter(o=>o.x>-40);
  A.drops.forEach(o=>{o.x-=sp;o.tk+=0.1;});A.drops=A.drops.filter(o=>o.x>-40);

  // --- バウ！衝撃波 ---
  if(A.wave){
    A.wave.r+=20;A.wave.life--;
    A.obs=A.obs.filter(o=>{
      const oy=o.fly?o.y:o.y-o.h/2;
      const dist=Math.hypot(o.x-d.x,oy-(d.y-38));
      if(dist<A.wave.r){burst(o.x+o.w/2,oy,'#a8c8ff');return false;}
      return true;
    });
    // 羽根弾の撃ち返し
    A.proj.forEach(p=>{
      if(!p.refl&&Math.hypot(p.x-d.x,p.y-(d.y-38))<A.wave.r){
        p.refl=true;
        p.vx=8.5;
        p.vy=A.boss?(A.boss.y-p.y)*0.035:-2;
      }
    });
    // ボスへの直撃（1波につき1回）
    if(A.bossActive&&A.boss&&!A.wave.bossHit&&
       Math.hypot(A.boss.x-d.x,A.boss.y-(d.y-38))<A.wave.r){
      A.wave.bossHit=true;bossHurt();
    }
    if(A.wave&&A.wave.life<=0)A.wave=null;
  }
  if(A.over)return;

  // --- 当たり判定 ---
  const invinc=d.inv>0||A.featherT>0;
  const sliding=d.slide>0&&d.y>=GROUND-2;
  const dx=d.x-16,dy=sliding?d.y-26:d.y-44,dw=42,dh=sliding?24:40;
  if(!invinc)for(const o of A.obs){
    const oy=o.fly?o.y:o.y-o.h;
    if(dx<o.x+o.w-8&&dx+dw>o.x+8&&dy<oy+o.h-6&&dy+dh>oy+6){
      if(o.k==='poop'){SE.poop();failStage('poop');return;} // 踏んだら即アウト
      hurt();if(A.over)return;
      break;
    }
  }
  // 羽根弾 vs うゆ
  if(!invinc)for(const p of A.proj){
    if(!p.refl&&!p.dead&&Math.abs(p.x-d.x)<24&&Math.abs(p.y-(d.y-(sliding?14:36)))<(sliding?18:30)){
      p.dead=true;hurt();if(A.over)return;break;
    }
  }
  for(const o of A.orbs){
    if(!o.hit&&Math.abs(o.x-d.x)<34&&Math.abs(o.y-(d.y-38))<42){o.hit=true;A.got++;A.flash=8;SE.orb();updHUD();}
  }
  A.orbs=A.orbs.filter(o=>!o.hit);
  for(const o of A.drops){
    if(!o.hit&&Math.abs(o.x-d.x)<36&&Math.abs(o.y-(d.y-38))<44){
      o.hit=true;G.items[o.type]=(G.items[o.type]||0)+1;A.flash=8;SE.item();
      burst(o.x,o.y,'#ffe9b0');updItemBar();
    }
  }
  A.drops=A.drops.filter(o=>!o.hit);

  A.parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;});
  A.parts=A.parts.filter(p=>p.life>0);

  draw(prog,gliding);
  if(A.t>=A.dur&&!A.over){
    if(G.stage===2){
      if(!A.bossActive&&!A.bossDone&&A.bossOut===0)startBoss();
    }else{
      A.over=true;clearStage();
    }
  }
}

/* ---------- 共通ダメージ ---------- */
function hurt(){
  G.hearts--;A.dog.inv=85;A.shake=14;SE.hit();
  updHUD();updItemBar();
  if(G.hearts<=0)failStage();
}

/* ---------- ボス：嵐の主 ---------- */
function startBoss(){
  A.bossActive=true;
  A.boss={x:640,y:168,ph:0,hp:5,atk:110,swoopT:-1,flash:0};
  setBGM('boss');SE.boss();
  $('#stageTitle .no').textContent='WARNING';
  $('#stageTitle .nm').textContent='嵐の主、あらわる';
  $('#stageTitle .tip').textContent='バウ！が使い放題に（クールダウンあり）\n羽根弾を波にのせて撃ち返せ！ 突進はジャンプでかわせ';
  const stt=$('#stageTitle');stt.style.opacity=1;
  setTimeout(()=>stt.style.opacity=0,2400);
  updItemBar();
}
function bossHurt(){
  const b=A.boss;if(!b)return;
  b.hp--;b.flash=10;SE.hit();
  burst(b.x,b.y,'#ffe9b0');
  if(b.hp<=0)bossDefeat();
}
function bossDefeat(){
  const b=A.boss;
  const bx=b.x,by=b.y;
  for(let i=0;i<4;i++)setTimeout(()=>{if(A&&!A.over)burst(bx+(Math.random()-.5)*80,by+(Math.random()-.5)*50,'#ffd98a');},i*120);
  SE.boss();
  A.proj=[];A.boss=null;A.bossActive=false;A.bossDone=true;A.bossOut=80;
  $('#debuff').textContent='嵐の主は、ただの迷子の風だった——空へ帰っていく';
  updItemBar();
}
function updateBoss(){
  const b=A.boss,d=A.dog;
  b.ph++;if(b.flash>0)b.flash--;
  if(A.barkCd>0){A.barkCd--;if(A.barkCd===0)updItemBar();}
  $('#debuff').textContent='嵐の主 '+'♥'.repeat(Math.max(0,b.hp))+'♡'.repeat(Math.max(0,5-b.hp))+'　（バウ！で応戦）';
  if(b.swoopT>=0){
    // 突進：地面すれすれを横切る
    b.swoopT++;
    const u=b.swoopT/130;
    b.x=680-880*u;
    b.y=u<0.4?168+(GROUND-56-168)*(u/0.4):GROUND-56;
    if(b.swoopT>=130){b.swoopT=-1;b.x=640;b.y=168;}
    const invinc=d.inv>0||A.featherT>0;
    if(!invinc&&Math.abs(b.x-d.x)<52&&Math.abs(b.y-(d.y-34))<48){hurt();if(A.over)return;}
  }else{
    b.y=168+Math.sin(b.ph*0.045)*24;
    b.atk--;
    if(b.atk<=0){
      const px=b.x-42,py=b.y+6;
      const tx=d.x,ty=d.y-28-(Math.random()<0.4?55:0);
      const L=Math.hypot(tx-px,ty-py)||1,s=6.6+Math.random()*1.5;
      A.proj.push({x:px,y:py,vx:(tx-px)/L*s,vy:(ty-py)/L*s,refl:false,rot:0,dead:false});
      tone(560,0.08,'triangle',.3,-180);
      b.atk=64+Math.random()*52;
    }
    if(b.ph%400===399)b.swoopT=0;
  }
  // 弾の移動と反射弾のボス命中
  A.proj.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=0.25;});
  for(const p of A.proj){
    if(p.refl&&!p.dead&&A.boss&&Math.abs(p.x-A.boss.x)<48&&Math.abs(p.y-A.boss.y)<40){
      p.dead=true;bossHurt();if(!A.boss)break;
    }
  }
  A.proj=A.proj.filter(p=>!p.dead&&p.x>-40&&p.x<W+80&&p.y>-40&&p.y<H+40);
}

function drawSkyline(){
  const t=A.t,st=A.st,sc=st.scene;

  ctx.fillStyle='rgba(20,30,60,.9)';

    const cols=['rgba(255,120,140,.55)','rgba(255,200,90,.55)','rgba(120,220,170,.5)','rgba(120,170,255,.5)'];

  }
  if(sc==='bridge'){

    for(let k=-1;k<=1;k++){
      const x1=W*0.5+(k)*L-off+L*0.5, x2=x1+L;
      const yT=GROUND-268,yM=GROUND-96;
      ctx.beginPath();ctx.moveTo(x1,yT);ctx.quadraticCurveTo((x1+x2)/2,yM,x2,yT);ctx.stroke();
      ctx.lineWidth=1.4;
      for(let u=0.08;u<0.95;u+=0.075){
        const hx=x1+(x2-x1)*u;
        const hy=(1-u)*(1-u)*yT+2*u*(1-u)*yM+u*u*yT;
        ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx,GROUND-34);ctx.stroke();
      }
      ctx.lineWidth=3;
    }
    // 欄干
    ctx.strokeStyle='rgba(160,185,235,.7)';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-20,GROUND-34);ctx.lineTo(W+20,GROUND-34);ctx.stroke();
    // 眼下の海のきらめき
    ctx.fillStyle='rgba(140,180,240,.18)';
    for(let i=0;i<7;i++){
      const wx=((i*167+t*1.4)%(W+80))-40;
      ctx.fillRect(wx,H-24+((i*13)%14),34,2.5);
    }
  }
}
function drawFujiTV(x){

  ctx.fillRect(x,top+70,w,14);
  ctx.fillRect(x,GROUND-46,w,20);
  // 格子の空中回廊
  ctx.strokeStyle='rgba(120,145,200,.5)';ctx.lineWidth=2;
  for(let i=1;i<6;i++){
    ctx.beginPath();ctx.moveTo(x+26,top+16+i*18);ctx.lineTo(x+w-26,top+16+i*18);ctx.stroke();
  }
  // 球体展望室
  const cxx=x+w*0.62,cy=top+46;
  const sg=ctx.createRadialGradient(cxx-7,cy-7,3,cxx,cy,25);

  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cxx,cy,24,0,7);ctx.fill();

/* ---------- エンディング判定（純粋関数：test/game-logic.test.js で検証） ---------- */
// 記憶回収率ときずなから 3=TRUE / 2=GOOD / 1=ANOTHER を決める
function endingRank(ratio,kizuna){
  if(ratio>=0.7&&kizuna>=5)return 3;
  if(ratio>=0.4)return 2;
  return 1;
}
// ベスト記録を更新すべきか。優先度：ランク > かけら数 > タイム（短いほど良い）
function betterRecord(prev,cand){
  if(!prev)return true;
  if(cand.rank!==prev.rank)return cand.rank>prev.rank;
  if(cand.orbs!==prev.orbs)return cand.orbs>prev.orbs;
  return cand.time<prev.time;
}

/* ---------- エンディング ---------- */
function showEnding(){
  const ratio=G.orbMax?G.orbs/G.orbMax:0;
  const rank=endingRank(ratio,G.kizuna);
  let t,s,body;
  if(rank===3){
    t='おかえりの音';s='— TRUE END —';
    body=`帰り道は、ひとりぶんの足音と、四つの肉球の音。玄関では、ビスケが「べつに、心配してないし」という顔で座っていて——ふたりを見たとたん、大きなあくびをした。耳の先だけ、正直にうれしそうに揺れていた。\n\n次の日から、うゆの散歩コースには寄り道がひとつ増えた。倉庫街の、白い犬のところ。半年ぶりに帰ってきた船乗りさんの大きな手は、潮と太陽の匂いがして、うゆの頭を、くしゃくしゃに撫でた。\n\n「この子が、噂の迎えにいった子か」と船乗りさんは笑った。白い犬は、なにも言わずに海を見ていた。しっぽだけが、ずっと、ずっと揺れていた。\n\n翼は、もうない。でも、かまわない。空のどこよりも帰りたい場所を、うゆはもう知っているから。`;
  }else if(rank===2){
    t='朝の光';s='— GOOD END —';
    body=`その朝は、みんなで二度寝をした。ソファの上、ふたりと二頭ぶんの、しあわせな重さ。\n\n「そういえばさ」と、あの人が眠りかけの声で言った。「ゆうべ橋のほうで、金色のちっちゃい流れ星を見た気がするんだよね。……変な話だけど、あれ見たら、急に家に帰れる気がしたんだ」\n\nうゆはしっぽで、いちどだけ、ぱたんと返事をした。夜の街のどこかでは、拾われなかった記憶のかけらが、まだやさしく光っている。`;
  }else{
    t='まどろみ';s='— ANOTHER END —';
    body=`夢か、ほんとうか。それはまだ、ないしょ。\n\nただ、つぎの雨の日。あの人は帰るなり、自分より先に、タオルでうゆとビスケを拭いた。あの日とおんなじ順番で。\n\n——つぎに夜の窓の外で金色の光がまたたいたら、そのときは。うゆはきっともう、迷わない。`;
  }
  $('#endTitle').textContent=t;
  $('#endSub').textContent=s;
  const secs=(Date.now()-G.t0-G.pausedMs)/1000;
  $('#endStats').textContent=`記憶のかけら ${G.orbs}/${G.orbMax} ・ きずな ${G.kizuna} ・ クリアタイム ${fmtTime(secs)}（LV${G.level}）`;
  // TRUE ENDへのヒント（そっと）
  let hint='';
  if(rank<3){
    const miss=[];
    if(ratio<0.7)miss.push('……夜の街には、拾われなかった記憶のかけらが、まだ光っていた。');
    if(G.kizuna<5)miss.push('……夜のだれかに、もうすこし心をひらいて答えていたら、なにかが変わったのかもしれない。');
    miss.push('（もう一度、ちがう選択で走れば——きっと、ほんとうの「おかえり」にたどりつく）');
    hint=miss.join('\n');
  }
  $('#endHint').textContent=hint;
  // ベスト記録更新（エンド優先→かけら数）
  const rec=G.records[G.level];
  if(betterRecord(rec,{rank,orbs:G.orbs,time:secs})){
    G.records[G.level]={orbs:G.orbs,max:G.orbMax,rank,time:secs};
    saveRecords();
  }
  // 段落を1つずつタップで送るエピローグ表示（長文あふれ・ボタン到達不可の解消）
  epiParas=body.split(/\n\n+/);epiIdx=0;epiDone=false;
  $('#endHint').style.display='none';$('#endStats').style.display='none';$('#endBtnWrap').style.display='none';
  renderEpi();
  setBGM('story');
  show('ending');
  $('#ending').scrollTop=0;
}
let epiParas=[],epiIdx=0,epiDone=false;
function renderEpi(){
  const el=$('#endText'),last=epiIdx>=epiParas.length-1;
  el.style.opacity='0';
  setTimeout(()=>{
    el.textContent=epiParas[epiIdx]||'';el.style.opacity='1';
    $('#ending').scrollTop=last?$('#ending').scrollHeight:0;
  },170);
  $('#endMark').style.display=last?'none':'block';
  if(last){
    $('#endHint').style.display=$('#endHint').textContent?'':'none';
    $('#endStats').style.display='';
    $('#endBtnWrap').style.display='';
    epiDone=true;
  }
}
$('#ending').addEventListener('click',e=>{
  if(e.target.closest('#againBtn'))return;
  if(epiDone)return;
  epiIdx=Math.min(epiIdx+1,epiParas.length-1);
  renderEpi();
});
$('#endText').style.textAlign='left';

/* ---------- 開始/リトライ ---------- */
document.querySelectorAll('.lvBtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.lvBtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');G.level=+b.dataset.lv;
  });
});
$('#startBtn').onclick=()=>{
  audioInit();
  G.orbs=0;G.orbMax=0;G.kizuna=0;G.t0=Date.now();G.pausedMs=0;G.pauseStart=0;
  G.items={snack:0,feather:0,bark:0};
  startScene(0);
};
$('#againBtn').onclick=()=>{setBGM(null);renderRecords();show('title');};
$('#muteBtn').onclick=()=>{
  audioInit();
  SND.mute=!SND.mute;
  $('#muteBtn').classList.toggle('off',SND.mute);
  $('#muteBtn').textContent=SND.mute?'✕':'♪';
};
renderRecords();

/* --- テスト用エクスポート：ブラウザでは module が未定義なので実行されない（ゲーム動作に影響なし） --- */
if(typeof module!=='undefined'&&module.exports){
  module.exports={nf,fmtTime,buildSong,SONGDEF,endingRank,betterRecord,RANK_NAMES,finaleLines,scenes};
}
</script>
